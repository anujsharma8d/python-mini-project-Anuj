<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1625;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1b4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0c1a;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="boardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a2f5c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1530;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main background -->
  <rect width="1200" height="600" fill="url(#bgGradient)"/>
  
  <!-- Decorative grid pattern -->
  <g opacity="0.1" stroke="#9fddb5">
    <line x1="100" y1="0" x2="100" y2="600" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="600" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="600" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="600" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="600" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="600" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="600" stroke-width="1"/>
    <line x1="1100" y1="0" x2="1100" y2="600" stroke-width="1"/>
    <line x1="0" y1="75" x2="1200" y2="75" stroke-width="1"/>
    <line x1="0" y1="150" x2="1200" y2="150" stroke-width="1"/>
    <line x1="0" y1="225" x2="1200" y2="225" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke-width="1"/>
    <line x1="0" y1="375" x2="1200" y2="375" stroke-width="1"/>
    <line x1="0" y1="450" x2="1200" y2="450" stroke-width="1"/>
    <line x1="0" y1="525" x2="1200" y2="525" stroke-width="1"/>
  </g>
  
  <!-- Left side - Game board visualization -->
  <g>
    <!-- Board background -->
    <rect x="80" y="100" width="320" height="320" rx="16" fill="url(#boardGradient)" stroke="#9fddb5" stroke-width="3"/>
    
    <!-- Grid cells with colored regions -->
    <g stroke="#4a3f6a" stroke-width="1">
      <!-- Row 1 -->
      <rect x="90" y="110" width="45" height="45" fill="#FF6B6B" opacity="0.2"/>
      <rect x="141" y="110" width="45" height="45" fill="#FF6B6B" opacity="0.2"/>
      <rect x="192" y="110" width="45" height="45" fill="#4ECDC4" opacity="0.2"/>
      <rect x="243" y="110" width="45" height="45" fill="#4ECDC4" opacity="0.2"/>
      <rect x="294" y="110" width="45" height="45" fill="#45B7D1" opacity="0.2"/>
      <rect x="345" y="110" width="45" height="45" fill="#45B7D1" opacity="0.2"/>
      
      <!-- Row 2 -->
      <rect x="90" y="161" width="45" height="45" fill="#FF6B6B" opacity="0.2"/>
      <rect x="141" y="161" width="45" height="45" fill="#FFA07A" opacity="0.2"/>
      <rect x="192" y="161" width="45" height="45" fill="#4ECDC4" opacity="0.2"/>
      <rect x="243" y="161" width="45" height="45" fill="#98D8C8" opacity="0.2"/>
      <rect x="294" y="161" width="45" height="45" fill="#45B7D1" opacity="0.2"/>
      <rect x="345" y="161" width="45" height="45" fill="#F7DC6F" opacity="0.2"/>
      
      <!-- Row 3 -->
      <rect x="90" y="212" width="45" height="45" fill="#FFA07A" opacity="0.2"/>
      <rect x="141" y="212" width="45" height="45" fill="#FFA07A" opacity="0.2"/>
      <rect x="192" y="212" width="45" height="45" fill="#98D8C8" opacity="0.2"/>
      <rect x="243" y="212" width="45" height="45" fill="#98D8C8" opacity="0.2"/>
      <rect x="294" y="212" width="45" height="45" fill="#F7DC6F" opacity="0.2"/>
      <rect x="345" y="212" width="45" height="45" fill="#F7DC6F" opacity="0.2"/>
      
      <!-- Row 4 -->
      <rect x="90" y="263" width="45" height="45" fill="#FFA07A" opacity="0.2"/>
      <rect x="141" y="263" width="45" height="45" fill="#98D8C8" opacity="0.2"/>
      <rect x="192" y="263" width="45" height="45" fill="#98D8C8" opacity="0.2"/>
      <rect x="243" y="263" width="45" height="45" fill="#BB8FCE" opacity="0.2"/>
      <rect x="294" y="263" width="45" height="45" fill="#F7DC6F" opacity="0.2"/>
      <rect x="345" y="263" width="45" height="45" fill="#BB8FCE" opacity="0.2"/>
      
      <!-- Row 5 -->
      <rect x="90" y="314" width="45" height="45" fill="#85C1E2" opacity="0.2"/>
      <rect x="141" y="314" width="45" height="45" fill="#BB8FCE" opacity="0.2"/>
      <rect x="192" y="314" width="45" height="45" fill="#BB8FCE" opacity="0.2"/>
      <rect x="243" y="314" width="45" height="45" fill="#BB8FCE" opacity="0.2"/>
      <rect x="294" y="314" width="45" height="45" fill="#85C1E2" opacity="0.2"/>
      <rect x="345" y="314" width="45" height="45" fill="#BB8FCE" opacity="0.2"/>
      
      <!-- Row 6 -->
      <rect x="90" y="365" width="45" height="45" fill="#85C1E2" opacity="0.2"/>
      <rect x="141" y="365" width="45" height="45" fill="#85C1E2" opacity="0.2"/>
      <rect x="192" y="365" width="45" height="45" fill="#F8B88B" opacity="0.2"/>
      <rect x="243" y="365" width="45" height="45" fill="#F8B88B" opacity="0.2"/>
      <rect x="294" y="365" width="45" height="45" fill="#85C1E2" opacity="0.2"/>
      <rect x="345" y="365" width="45" height="45" fill="#F8B88B" opacity="0.2"/>
    </g>
    
    <!-- Queen icons on some cells -->
    <text x="117" y="142" font-size="28" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)">👑</text>
    <text x="270" y="193" font-size="28" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)">👑</text>
    <text x="370" y="295" font-size="28" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)">👑</text>
    <text x="115" y="346" font-size="28" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)">👑</text>
    <text x="218" y="397" font-size="28" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)">👑</text>
  </g>
  
  <!-- Right side - Text and icons -->
  <g>
    <!-- Title -->
    <text x="600" y="140" font-size="56" font-weight="700" font-family="'Space Grotesk', sans-serif" fill="#9fddb5">
      Queens Logic
    </text>
    <text x="600" y="200" font-size="56" font-weight="700" font-family="'Space Grotesk', sans-serif" fill="#9fddb5">
      Puzzle
    </text>
    
    <!-- Subtitle -->
    <text x="600" y="250" font-size="20" font-family="'Space Grotesk', sans-serif" fill="#d8c6b6" opacity="0.9">
      Master the classic logic puzzle
    </text>
    
    <!-- Features -->
    <g font-family="'Space Grotesk', sans-serif" font-size="16" fill="#f8eee4">
      <text x="600" y="300">✓ Place queens strategically</text>
      <text x="600" y="335">✓ Follow region constraints</text>
      <text x="600" y="370">✓ No adjacent queens allowed</text>
      <text x="600" y="405">✓ Timer & move counter</text>
      <text x="600" y="440">✓ Hint & undo options</text>
    </g>
    
    <!-- Large queen emoji decoration -->
    <text x="1050" y="350" font-size="180" opacity="0.15" text-anchor="middle" dominant-baseline="middle">👑</text>
  </g>
  
  <!-- Accent elements -->
  <circle cx="200" cy="500" r="60" fill="#9fddb5" opacity="0.08"/>
  <circle cx="1050" cy="150" r="80" fill="#f2a65a" opacity="0.06"/>
</svg>
